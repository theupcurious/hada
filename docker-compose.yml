services:
  openclaw:
    build:
      context: ./moltbot
      dockerfile: Dockerfile
    ports:
      - "18789:18789"
    env_file:
      - .env.local
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENCLAW_AUTH_TOKEN=${OPENCLAW_AUTH_TOKEN:-hada-dev-token-12345}
    volumes:
      - openclaw-data:/root/.openclaw/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openclaw-data:
